<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HymnSinger - Practice Tool</title>
    
    <!-- Import map for ES modules -->
    <script type="importmap">
    {
      "imports": {
        "lz-string": "https://cdn.jsdelivr.net/npm/lz-string@1.5.0/+esm"
      }
    }
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
        }

        .app-container {
            padding: 20px;
        }

        #input-container {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #ddd;
        }

        #abc-toggle-input {
            display: block;
            margin-bottom: 10px;
            padding: 8px 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        #abc-toggle-input:hover {
            background-color: #2980b9;
        }

        #abc-text-area {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            line-height: 1.5;
        }

        #abc-text-area:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        #renderer-container {
            width: 100%;
            min-height: 300px;
            background-color: #fafafa;
            border-radius: 4px;
            overflow: hidden;
        }

        #abc-svg-wrapper {
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-message {
            color: #e74c3c;
            background-color: #fadbd8;
            border: 1px solid #e74c3c;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        /* Minimal abcjs audio control styles (prevents visible "CSS required" warning) */
        .abcjs-inline-audio {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            background: transparent;
        }
        .abcjs-inline-audio .abcjs-css-warning { display: none !important; }
        .abcjs-inline-audio .abcjs-btn {
            background: none;
            border: none;
            padding: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .abcjs-midi-progress-background { position: relative; width: 160px; height: 10px; background: #eee; border-radius: 6px; }
        .abcjs-midi-progress-indicator { position: absolute; left: 0; top: 0; width: 10px; height: 10px; background: #3498db; border-radius: 50%; }
        .abcjs-midi-clock { font-size: 12px; color: #333; margin-left: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 HymnSinger Practice Tool</h1>
            <p>Practice hymns with interactive music notation</p>
        </div>

        <div id="app-container" class="app-container">
            <div id="input-container">
                <textarea id="abc-text-area" placeholder="Enter ABC notation here..."></textarea>
            </div>
            <div id="renderer-container"></div>
        </div>
    </div>

    <!-- Load abcjs library with synth support -->
    <script src="https://cdn.jsdelivr.net/npm/abcjs@6.6.4/dist/abcjs-basic-min.js" onload="window.abcjsLoaded = true;"></script>

    <!-- Load app as ES module -->
    <script type="module">
        import { AudioSynthesizer } from './dist/AudioSynthesizer.js';
        import { PlaybackCoordinator } from './dist/PlaybackCoordinator.js';
        import { HymnSingerApp } from './dist/HymnSingerApp.js';
        
        // Expose to window so initialization code can access them
        window.AudioSynthesizer = AudioSynthesizer;
        window.PlaybackCoordinator = PlaybackCoordinator;
        window.HymnSingerApp = HymnSingerApp;
        
        // Wait for both DOM and abcjs to be ready
        function waitForAbcjs() {
            return new Promise((resolve) => {
                if (window.abcjsLoaded && typeof window.ABCJS !== 'undefined') {
                    console.log('ABCJS already loaded');
                    resolve();
                    return;
                }
                
                let attempts = 0;
                const maxAttempts = 200; // ~10 seconds with 50ms interval
                const interval = setInterval(() => {
                    attempts++;
                    if (typeof window.ABCJS !== 'undefined') {
                        console.log('ABCJS loaded after', attempts * 50, 'ms');
                        clearInterval(interval);
                        resolve();
                    } else if (attempts >= maxAttempts) {
                        console.warn('ABCJS did not load within timeout, proceeding anyway');
                        clearInterval(interval);
                        resolve();
                    }
                }, 50);
            });
        }
        
        // Trigger initialization when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
        
        async function initApp() {
            try {
                console.log('Starting app initialization...');
                
                // Wait for abcjs to load
                await waitForAbcjs();
                console.log('ABCJS available:', typeof window.ABCJS !== 'undefined');
                
                // Create audio synthesizer and playback coordinator
                console.log('Creating AudioSynthesizer...');
                const audioSynthesizer = new window.AudioSynthesizer();
                console.log('AudioSynthesizer created');
                
                console.log('Creating PlaybackCoordinator...');
                const playbackCoordinator = new window.PlaybackCoordinator(audioSynthesizer);
                console.log('PlaybackCoordinator created');

                // Initialize app with playback and audio control callbacks
                console.log('Creating HymnSingerApp...');
                window.app = new window.HymnSingerApp(
                    'app-container',
                    'abc-text-area',
                    'renderer-container',
                    // Audio controls callbacks
                    (speed) => audioSynthesizer.setSpeed(speed),
                    (volume) => audioSynthesizer.setPianoVolume(volume),
                    (volume) => audioSynthesizer.setMetronomeVolume(volume),
                    // Playback controls callbacks
                    () => playbackCoordinator.play(),     // onPlay
                    () => audioSynthesizer.pause(),        // onPause
                    () => audioSynthesizer.stop()          // onStop
                );
                console.log('HymnSingerApp created');

                // Initialize playback coordinator with the renderer's SVG wrapper
                console.log('Initializing PlaybackCoordinator...');
                const renderer = window.app.getRenderer();
                playbackCoordinator.initialize(audioSynthesizer, renderer.getSvgWrapper());
                // Expose playbackCoordinator for debugging and e2e tests
                window.playbackCoordinator = playbackCoordinator;
                console.log('PlaybackCoordinator initialized');

                // Initialize synth if abcjs is available and renderer produced an abcjs instance
                try {
                    const abcjsInstance = renderer.getAbcjsInstance && typeof renderer.getAbcjsInstance === 'function' ? renderer.getAbcjsInstance() : null;
                    if (typeof window.ABCJS !== 'undefined' && abcjsInstance && abcjsInstance[0]) {
                        console.log('Initializing synth...');
                        await audioSynthesizer.initializeSynth(abcjsInstance, true);
                        console.log('AudioSynthesizer initialized');
                    } else {
                        console.warn('ABCJS synth not initialized: abcjs instance not available');
                    }
                } catch (err) {
                    console.error('Error initializing synth:', err);
                }

                console.log('HymnSinger app initialized with playback and audio controls');
            } catch (error) {
                console.error('Failed to initialize HymnSingerApp:', error);
                console.error('Stack:', error instanceof Error ? error.stack : 'No stack available');
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.textContent = 'Error initializing application: ' + error;
                document.getElementById('app-container').insertBefore(
                    errorDiv,
                    document.getElementById('app-container').firstChild
                );
            }
        }
    </script>
</body>
</html>
